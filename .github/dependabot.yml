version: 2

updates:
  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps)"
    labels:
      - dependencies
    ignore:
      # chi 5.3.0 deprecates middleware.RealIP for IP spoofing
      # (GHSA-3fxj-6jh8-hvhx et al). Our own ClientIP helper in
      # internal/presenters/api/middleware/ip.go has the same flaw, so
      # the chi upgrade needs to land together with a trusted-proxy
      # resolver. Lift this pin once that ships.
      - dependency-name: "github.com/go-chi/chi/v5"
        versions: [">=5.3.0"]
    groups:
      production:
        dependency-type: production
        update-types:
          - minor
          - patch
      major:
        update-types:
          - major

  - package-ecosystem: npm
    directory: /web
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps)"
    labels:
      - dependencies
      - frontend
    groups:
      production:
        dependency-type: production
        update-types:
          - minor
          - patch
      development:
        dependency-type: development
        update-types:
          - minor
          - patch

  - package-ecosystem: npm
    directory: /extension
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 3
    commit-message:
      prefix: "chore(deps)"
    labels:
      - dependencies
      - extension

  - package-ecosystem: npm
    directory: /docs-site
    schedule:
      interval: monthly
    open-pull-requests-limit: 3
    commit-message:
      prefix: "chore(deps)"
    labels:
      - dependencies
      - docs

  - package-ecosystem: docker
    directory: /
    schedule:
      interval: monthly
    commit-message:
      prefix: "chore(docker)"
    labels:
      - dependencies
      - docker

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    commit-message:
      prefix: "ci(deps)"
    labels:
      - dependencies
      - ci
    groups:
      actions:
        patterns:
          - "*"
