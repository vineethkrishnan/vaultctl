name: load

# M15 baseline load test. Runs k6 against a locally-built vaultctl server
# inside the CI runner. Gated on a PR label or manual dispatch — NOT on
# every push, because it needs ~2 minutes of runtime and is flappy on
# shared runners.
#
# Parameters: to change VUs or duration, edit the `env:` block below or
# use repository variables (vars.LOAD_VUS / vars.LOAD_DURATION). We do
# NOT read them from workflow_dispatch inputs to stay clear of GHA's
# expression-injection surface — inputs are user-controlled strings and
# the safest pattern is to keep them out of `run:` lines entirely.

on:
  workflow_dispatch:
  pull_request:
    types: [labeled]

permissions:
  contents: read

concurrency:
  group: load-${{ github.ref }}
  cancel-in-progress: true

jobs:
  k6-baseline:
    # Only run on PRs when the 'load-test' label is applied, or on manual dispatch.
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' && github.event.label.name == 'load-test')
    name: k6 baseline (100 VUs, p95 < 200ms)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    services:
      postgres:
        image: public.ecr.aws/docker/library/postgres:16
        env:
          POSTGRES_USER: vaultctl
          POSTGRES_PASSWORD: vaultctl
          POSTGRES_DB: vaultctl
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
        ports:
          - 5432:5432
    env:
      # k6 tunables — repository variables override in CI, hardcoded defaults otherwise.
      VUS: ${{ vars.LOAD_VUS || '100' }}
      DURATION: ${{ vars.LOAD_DURATION || '1m' }}
      VAULTCTL_URL: http://localhost:8080
      VAULTCTL_ENV: development
      VAULTCTL_DB_HOST: localhost
      VAULTCTL_DB_PORT: '5432'
      VAULTCTL_DB_USER: vaultctl
      VAULTCTL_DB_PASSWORD: vaultctl
      VAULTCTL_DB_NAME: vaultctl
      VAULTCTL_DB_SSL_MODE: disable
      VAULTCTL_JWT_SECRET_CURRENT: load-test-jwt-secret-at-least-32-bytes-ok
      VAULTCTL_SERVER_PEPPER: load-test-server-pepper-32-bytes-ok
      VAULTCTL_ENUMERATION_PEPPER: load-test-enum-pepper-32-bytes-ok
      VAULTCTL_DATA_ENCRYPTION_KEY: LBrXjzRmKOwYu7V5rHYqStuwJ7pSu8+Wt4w5cKfYk5A=
      VAULTCTL_BASE_URL: http://localhost:8080
      VAULTCTL_REGISTRATION_MODE: open
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: install migrate
        run: |
          curl -fsSL https://github.com/golang-migrate/migrate/releases/download/v4.17.0/migrate.linux-amd64.tar.gz \
            | sudo tar -xz -C /usr/local/bin migrate

      - name: run migrations
        run: |
          migrate -path migrations -database "postgres://vaultctl:vaultctl@localhost:5432/vaultctl?sslmode=disable" up

      - name: build vaultctl
        run: go build -o ./vaultctl ./cmd/server

      - name: start vaultctl server
        run: |
          ./vaultctl server > server.log 2>&1 &
          echo $! > server.pid
          # Wait for /health — give it 30s, bail out hard if it doesn't come up
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:8080/api/v1/health >/dev/null 2>&1; then
              echo "server up after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "server failed to start"
          cat server.log
          exit 1

      - name: install k6
        uses: grafana/setup-k6-action@v1

      - name: run k6 baseline
        run: k6 run test/load/k6-baseline.js

      - name: stop vaultctl server
        if: always()
        run: |
          if [ -f server.pid ]; then
            kill "$(cat server.pid)" || true
          fi

      - name: upload server logs on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: server-log
          path: server.log
          retention-days: 7

      - name: upload k6 summary
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: k6-summary
          path: test/load/.k6-summary.json
          retention-days: 30
          if-no-files-found: warn
