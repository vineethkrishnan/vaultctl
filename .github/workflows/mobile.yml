name: Mobile CI

on:
  pull_request:
    paths:
      - 'mobile/**'
      - 'web/src/shared/**'
      - '.github/workflows/mobile.yml'

concurrency:
  group: mobile-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    name: Type check and test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            mobile/package-lock.json
            web/package-lock.json

      - name: Install mobile dependencies
        working-directory: mobile
        run: npm ci --legacy-peer-deps

      # mobile/tsconfig.json maps @vaultctl/shared/* to ../web/src/shared/*; tsc
      # resolves those files' own imports (zod, hash-wasm) by walking up from
      # web/src/shared, so web's node_modules must exist alongside mobile's.
      - name: Install shared web dependencies
        working-directory: web
        run: npm ci

      - name: Type check
        working-directory: mobile
        run: npx tsc --noEmit

      - name: Unit tests
        working-directory: mobile
        run: npm test -- --no-coverage --ci
