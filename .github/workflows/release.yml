name: release

on:
  push:
    tags: ['v*']

permissions:
  contents: write       # create GitHub release
  packages: write       # push to GHCR
  id-token: write       # keyless cosign / SLSA OIDC
  attestations: write   # SLSA provenance attestation

jobs:
  goreleaser:
    name: goreleaser + cosign + SBOM
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: install cosign
        uses: sigstore/cosign-installer@v3

      - name: install syft (SBOM)
        uses: anchore/sbom-action/download-syft@v0

      - name: docker login (GHCR)
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: docker login (Docker Hub)
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: set up qemu (arm64 builds)
        uses: docker/setup-qemu-action@v4

      - name: set up buildx
        uses: docker/setup-buildx-action@v4

      - name: run goreleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # H13: SLSA L3 provenance attestation over every published binary + image.
      - name: attest build provenance
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: 'dist/*.tar.gz,dist/*.zip'

  dockerhub-description:
    name: Update Docker Hub Description
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6

      - name: Update Docker Hub description
        uses: peter-evans/dockerhub-description@v5
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: vineethnkrishnan/vaultctl
          short-description: "Zero-knowledge password vault. Self-hosted, E2E encrypted, open source."
          readme-filepath: docs/initial/prd.md
