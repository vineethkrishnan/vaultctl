name: release

on:
  push:
    tags: ['v*']

permissions:
  contents: write       # create GitHub release
  packages: write       # push to GHCR
  id-token: write       # keyless cosign / SLSA OIDC
  attestations: write   # SLSA provenance attestation
  deployments: write    # cloudflare pages deploy

jobs:
  goreleaser:
    name: goreleaser + cosign + SBOM
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: install cosign
        uses: sigstore/cosign-installer@v3

      - name: install syft (SBOM)
        uses: anchore/sbom-action/download-syft@v0

      - name: docker login (GHCR)
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: docker login (Docker Hub)
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: set up qemu (arm64 builds)
        uses: docker/setup-qemu-action@v4

      - name: set up buildx
        uses: docker/setup-buildx-action@v4

      - name: run goreleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # H13: SLSA L3 provenance attestation over every published binary + image.
      # Only available on public repos — skip while private.
      - name: attest build provenance
        if: github.event.repository.visibility == 'public'
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: 'dist/*.tar.gz,dist/*.zip'

  dockerhub-description:
    name: Update Docker Hub Description
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Update Docker Hub description
        uses: peter-evans/dockerhub-description@v5
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: vineethnkrishnan/vaultctl
          short-description: "Zero-knowledge password vault. Self-hosted, E2E encrypted, open source."
          readme-filepath: docs/initial/prd.md

  deploy-docs:
    name: Deploy Docs (Cloudflare Pages)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: docs-site
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: docs-site/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy out --project-name=vaultctl-docs --branch=main
          workingDirectory: docs-site
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
