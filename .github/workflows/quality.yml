name: quality

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  security-events: write

concurrency:
  group: quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: golangci-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11
          args: --timeout=5m

  govulncheck:
    name: govulncheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - name: run govulncheck
        run: govulncheck ./...

  gosec:
    name: gosec
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      # Pinned: a floating @master regressed //nolint:gosec honouring and pulled
      # newer rules that flag already-justified pre-existing code. G101/G304/G402
      # are excluded here because every occurrence already carries a justified
      # //nolint:gosec, and golangci-lint's gosec still scans those rules.
      - uses: securego/gosec@v2.22.9
        with:
          args: "-quiet -exclude=G104,G107,G115,G204,G101,G304,G402 ./..."
