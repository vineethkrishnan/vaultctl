basePath: /api/v1
definitions:
  github_com_vineethkrishnan_vaultctl_internal_application_auth.ExportData:
    properties:
      folders:
        items:
          $ref: '#/definitions/github_com_vineethkrishnan_vaultctl_internal_application_auth.ExportFolder'
        type: array
      items:
        items:
          $ref: '#/definitions/github_com_vineethkrishnan_vaultctl_internal_application_auth.ExportItem'
        type: array
      vaults:
        items:
          $ref: '#/definitions/github_com_vineethkrishnan_vaultctl_internal_application_auth.ExportVault'
        type: array
    type: object
  github_com_vineethkrishnan_vaultctl_internal_application_auth.ExportFolder:
    properties:
      createdAt:
        type: string
      encryptedName:
        type: string
      id:
        type: string
      vaultId:
        type: string
    type: object
  github_com_vineethkrishnan_vaultctl_internal_application_auth.ExportItem:
    properties:
      createdAt:
        type: string
      encryptedData:
        type: string
      encryptedName:
        type: string
      favorite:
        type: boolean
      folderId:
        type: string
      id:
        type: string
      itemType:
        type: string
      updatedAt:
        type: string
      vaultId:
        type: string
    type: object
  github_com_vineethkrishnan_vaultctl_internal_application_auth.ExportVault:
    properties:
      createdAt:
        type: string
      id:
        type: string
      name:
        type: string
      type:
        type: string
    type: object
  internal_presenters_api.APIKeyResponse:
    properties:
      createdAt:
        type: string
      expiresAt:
        type: string
      id:
        type: string
      keyPrefix:
        type: string
      lastUsedAt:
        type: string
      name:
        type: string
    type: object
  internal_presenters_api.BackupInfoDTO:
    properties:
      createdAt:
        type: string
      filename:
        type: string
      size:
        type: integer
    type: object
  internal_presenters_api.CreateAPIKeyRequest:
    properties:
      expiresIn:
        description: duration string
        type: string
      name:
        type: string
    type: object
  internal_presenters_api.CreateAPIKeyResponse:
    properties:
      expiresAt:
        type: string
      id:
        type: string
      key:
        description: raw key, shown only once
        type: string
      keyPrefix:
        type: string
      name:
        type: string
    type: object
  internal_presenters_api.CreateInviteRequest:
    properties:
      email:
        type: string
      expiresIn:
        description: duration string, e.g. "24h"
        type: string
      role:
        type: string
    type: object
  internal_presenters_api.CreateInviteResponse:
    properties:
      inviteId:
        type: string
      token:
        type: string
    type: object
  internal_presenters_api.CreateOrgRequest:
    properties:
      name:
        type: string
    type: object
  internal_presenters_api.ErrorBody:
    properties:
      error:
        properties:
          code:
            type: string
          field:
            type: string
          message:
            type: string
        type: object
    type: object
  internal_presenters_api.FolderCreateRequest:
    properties:
      encryptedName:
        type: string
    type: object
  internal_presenters_api.FolderResponse:
    properties:
      createdAt:
        type: string
      encryptedName:
        type: string
      id:
        type: string
      vaultId:
        type: string
    type: object
  internal_presenters_api.ImportItemDTO:
    properties:
      encryptedData:
        description: base64 wire-format blob
        type: string
      encryptedName:
        description: base64 wire-format blob
        type: string
      folderId:
        type: string
      itemType:
        type: string
    type: object
  internal_presenters_api.ImportRequest:
    properties:
      items:
        items:
          $ref: '#/definitions/internal_presenters_api.ImportItemDTO'
        type: array
      vaultId:
        type: string
    type: object
  internal_presenters_api.ImportResponse:
    properties:
      importedCount:
        type: integer
    type: object
  internal_presenters_api.InviteResponse:
    properties:
      createdAt:
        type: string
      email:
        type: string
      expiresAt:
        type: string
      id:
        type: string
      inviterId:
        type: string
      role:
        type: string
    type: object
  internal_presenters_api.ItemCreateRequest:
    properties:
      encryptedData:
        description: base64 wire-format blob
        type: string
      encryptedName:
        type: string
      favorite:
        type: boolean
      folderId:
        type: string
      itemType:
        type: string
      reprompt:
        type: boolean
    type: object
  internal_presenters_api.ItemReblobDTO:
    properties:
      encryptedData:
        type: string
      encryptedName:
        type: string
      itemId:
        type: string
    type: object
  internal_presenters_api.ItemResponse:
    properties:
      createdAt:
        type: string
      encryptedData:
        type: string
      encryptedName:
        type: string
      favorite:
        type: boolean
      folderId:
        type: string
      id:
        type: string
      itemType:
        type: string
      reprompt:
        type: boolean
      trashed:
        type: boolean
      updatedAt:
        type: string
      vaultId:
        type: string
    type: object
  internal_presenters_api.ItemUpdateRequest:
    properties:
      encryptedData:
        type: string
      encryptedName:
        type: string
      favorite:
        type: boolean
      folderId:
        type: string
      reprompt:
        type: boolean
    type: object
  internal_presenters_api.ListBackupsResponse:
    properties:
      backups:
        items:
          $ref: '#/definitions/internal_presenters_api.BackupInfoDTO'
        type: array
    type: object
  internal_presenters_api.LoginRequest:
    properties:
      authHash:
        description: redacted via LOG_REDACT_FIELDS (C4)
        type: string
      deviceName:
        type: string
      email:
        type: string
    type: object
  internal_presenters_api.LoginResponse:
    properties:
      accessToken:
        type: string
      encryptedIdentityPrivateKey:
        type: string
      encryptedPrivateKey:
        description: User crypto material for client-side key hydration (§4.2)
        type: string
      identityPublicKey:
        type: string
      publicKey:
        type: string
      publicKeySignature:
        type: string
      refreshExpiresAt:
        type: string
      refreshToken:
        type: string
      role:
        type: string
      sessionId:
        type: string
      upgradeAuthHash:
        type: boolean
      userId:
        type: string
      vaults:
        description: Vault memberships with wrapped keys
        items:
          $ref: '#/definitions/internal_presenters_api.VaultMembershipDTO'
        type: array
    type: object
  internal_presenters_api.LogoutRequest:
    properties:
      refreshToken:
        type: string
    type: object
  internal_presenters_api.OrgMemberResponse:
    properties:
      acceptedAt:
        type: string
      invitedAt:
        type: string
      orgId:
        type: string
      role:
        type: string
      userId:
        type: string
    type: object
  internal_presenters_api.OrgResponse:
    properties:
      createdAt:
        type: string
      createdBy:
        type: string
      id:
        type: string
      name:
        type: string
    type: object
  internal_presenters_api.PasswordChangeRequest:
    properties:
      encryptedIdentityPrivateKey:
        description: base64 wire blob
        type: string
      encryptedPrivateKey:
        description: base64 wire blob
        type: string
      newAuthHash:
        description: base64
        type: string
      oldAuthHash:
        description: base64
        type: string
    type: object
  internal_presenters_api.PasswordChangeResponse:
    properties:
      accessToken:
        type: string
      refreshExpiresAt:
        type: string
      refreshToken:
        type: string
    type: object
  internal_presenters_api.PasswordHintResponse:
    properties:
      hint:
        type: string
    type: object
  internal_presenters_api.PreloginResponse:
    properties:
      iterations:
        type: integer
      memoryKB:
        type: integer
      parallelism:
        type: integer
      salt:
        description: base64
        type: string
    type: object
  internal_presenters_api.PublicKeyResponse:
    properties:
      identityPublicKey:
        type: string
      publicKey:
        type: string
      userId:
        type: string
    type: object
  internal_presenters_api.PurgeTrashResponse:
    properties:
      purged:
        type: integer
    type: object
  internal_presenters_api.RecoveryResetRequest:
    properties:
      email:
        type: string
      encryptedIdentityPrivateKey:
        description: base64 wire blob
        type: string
      encryptedPrivateKey:
        description: base64 wire blob
        type: string
      newAuthHash:
        description: base64
        type: string
    type: object
  internal_presenters_api.RecoveryResetResponse:
    properties:
      accessToken:
        type: string
      refreshExpiresAt:
        type: string
      refreshToken:
        type: string
    type: object
  internal_presenters_api.RecoveryVerifyRequest:
    properties:
      email:
        type: string
    type: object
  internal_presenters_api.RecoveryVerifyResponse:
    properties:
      encryptedIdentityPrivateKey:
        type: string
      encryptedPrivateKey:
        type: string
      iterations:
        type: integer
      memoryKB:
        type: integer
      parallelism:
        type: integer
      salt:
        type: string
    type: object
  internal_presenters_api.RedeemInviteRequest:
    properties:
      token:
        type: string
    type: object
  internal_presenters_api.RedeemInviteResponse:
    properties:
      email:
        type: string
      orgId:
        type: string
      role:
        type: string
    type: object
  internal_presenters_api.RefreshRequest:
    properties:
      refreshToken:
        type: string
    type: object
  internal_presenters_api.RefreshResponse:
    properties:
      accessToken:
        type: string
      refreshExpiresAt:
        type: string
      refreshToken:
        type: string
    type: object
  internal_presenters_api.RegisterRequest:
    properties:
      authHash:
        description: base64
        type: string
      email:
        type: string
      encryptedIdentityPrivateKey:
        type: string
      encryptedPrivateKey:
        type: string
      identityPublicKey:
        type: string
      inviteToken:
        description: required when registration mode is "invite"
        type: string
      kdfIterations:
        type: integer
      kdfMemoryKB:
        type: integer
      kdfParallelism:
        type: integer
      masterPasswordPreflight:
        type: string
      name:
        type: string
      passwordHint:
        description: optional plaintext hint, server-encrypted (H4)
        type: string
      publicKey:
        type: string
      publicKeySignature:
        type: string
      salt:
        description: base64
        type: string
    type: object
  internal_presenters_api.RegisterResponse:
    properties:
      role:
        type: string
      userId:
        type: string
    type: object
  internal_presenters_api.RekeyBlobDTO:
    properties:
      encryptedVaultKey:
        type: string
      userId:
        type: string
      wrapSignature:
        type: string
    type: object
  internal_presenters_api.RekeyVaultRequest:
    properties:
      items:
        items:
          $ref: '#/definitions/internal_presenters_api.ItemReblobDTO'
        type: array
      newKeys:
        items:
          $ref: '#/definitions/internal_presenters_api.RekeyBlobDTO'
        type: array
    type: object
  internal_presenters_api.RemoveMemberResponse:
    properties:
      rekeyRequired:
        type: boolean
      remainingMembers:
        items:
          $ref: '#/definitions/internal_presenters_api.VaultMembershipDTO'
        type: array
    type: object
  internal_presenters_api.SessionResponse:
    properties:
      createdAt:
        type: string
      deviceName:
        type: string
      id:
        type: string
      ipAddress:
        type: string
      lastActiveAt:
        type: string
    type: object
  internal_presenters_api.ShareVaultRequest:
    properties:
      encryptedVaultKey:
        type: string
      recipientUserId:
        type: string
      role:
        type: string
      wrapSignature:
        type: string
    type: object
  internal_presenters_api.StepUpRequest:
    properties:
      authHash:
        description: base64 re-derived authHash
        type: string
    type: object
  internal_presenters_api.StepUpResponse:
    properties:
      accessToken:
        type: string
    type: object
  internal_presenters_api.TOTPCodeRequest:
    properties:
      code:
        description: 6-digit TOTP code
        type: string
    type: object
  internal_presenters_api.TOTPSetupResponse:
    properties:
      otpauthUrl:
        description: for QR code
        type: string
      secret:
        description: base32 for manual entry
        type: string
    type: object
  internal_presenters_api.UpdateMemberRoleRequest:
    properties:
      role:
        type: string
    type: object
  internal_presenters_api.UpdateProfileRequest:
    properties:
      name:
        type: string
    type: object
  internal_presenters_api.UserProfileResponse:
    properties:
      createdAt:
        type: string
      email:
        type: string
      id:
        type: string
      name:
        type: string
      role:
        type: string
    type: object
  internal_presenters_api.VaultCreateRequest:
    properties:
      encryptedVaultKey:
        type: string
      name:
        type: string
      type:
        type: string
      wrapSignature:
        type: string
    type: object
  internal_presenters_api.VaultMembershipDTO:
    properties:
      encryptedVaultKey:
        type: string
      role:
        type: string
      senderId:
        type: string
      vaultId:
        type: string
      vaultName:
        type: string
      vaultType:
        type: string
      wrapSignature:
        type: string
    type: object
  internal_presenters_api.VaultResponse:
    properties:
      createdAt:
        type: string
      encryptedVaultKey:
        type: string
      id:
        type: string
      name:
        type: string
      role:
        type: string
      senderId:
        type: string
      type:
        type: string
      wrapSignature:
        type: string
    type: object
host: localhost:8080
info:
  contact: {}
  description: Zero-knowledge, self-hosted password vault API
  title: vaultctl API
  version: "1.0"
paths:
  /admin/backup:
    post:
      description: Backup requires pg_dump (shell access) and is not suitable for
        HTTP API. Use the CLI instead.
      responses:
        "501":
          description: Not implemented — use CLI
          schema:
            $ref: '#/definitions/internal_presenters_api.ErrorBody'
      security:
      - BearerAuth: []
      summary: Trigger backup
      tags:
      - Admin
  /admin/backups:
    get:
      description: List available backup files with size and creation time. Admin
        only.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_presenters_api.ListBackupsResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_presenters_api.ErrorBody'
        "403":
          description: Admin required
          schema:
            $ref: '#/definitions/internal_presenters_api.ErrorBody'
      security:
      - BearerAuth: []
      summary: List backups
      tags:
      - Admin
  /api-keys:
    get:
      description: Returns all API keys for the authenticated user (without raw key
        values)
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/internal_presenters_api.APIKeyResponse'
            type: array
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_presenters_api.ErrorBody'
      security:
      - BearerAuth: []
      summary: List API keys
      tags:
      - API Keys
    post:
      consumes:
      - application/json
      description: Generate a new personal API key for programmatic access. The raw
        key is returned only once.
      parameters:
      - description: API key creation payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_presenters_api.CreateAPIKeyRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/internal_presenters_api.CreateAPIKeyResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_presenters_api.ErrorBody'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_presenters_api.ErrorBody'
      security:
      - BearerAuth: []
      summary: Create API key
      tags:
      - API Keys
  /api-keys/{id}:
    delete:
      description: Permanently delete a personal API key
      parameters:
      - description: API Key ID
        in: path
        name: id
        required: true
        type: string
      responses:
        "204":
          description: No content
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_presenters_api.ErrorBody'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/internal_presenters_api.ErrorBody'
      security:
      - BearerAuth: []
      summary: Delete API key
      tags:
      - API Keys
  /auth/login:
    post:
      consumes:
      - application/json
      description: Authenticate with email and auth hash, returns JWT tokens and encrypted
        crypto material
      parameters:
      - description: Login credentials
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_presenters_api.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_presenters_api.LoginResponse'
        "401":
          description: Invalid credentials
          schema:
            $ref: '#/definitions/internal_presenters_api.ErrorBody'
        "423":
          description: Account locked
          schema:
            $ref: '#/definitions/internal_presenters_api.ErrorBody'
        "429":
          description: Rate limited
          schema:
            $ref: '#/definitions/internal_presenters_api.ErrorBody'
      summary: Login
      tags:
      - Auth
  /auth/logout:
    post:
      consumes:
      - application/json
      description: Revoke the refresh token to end the session
      parameters:
      - description: Refresh token to revoke
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_presenters_api.LogoutRequest'
      responses:
        "204":
          description: No content
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_presenters_api.ErrorBody'
      summary: Logout
      tags:
      - Auth
  /auth/password/change:
    post:
      consumes:
      - application/json
      description: Change master password and re-encrypt private keys. Requires step-up.
      parameters:
      - description: Old and new auth hashes with re-encrypted keys
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_presenters_api.PasswordChangeRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_presenters_api.PasswordChangeResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_presenters_api.ErrorBody'
        "403":
          description: Step-up required
          schema:
            $ref: '#/definitions/internal_presenters_api.ErrorBody'
      security:
      - BearerAuth: []
      summary: Change master password
      tags:
      - Auth
  /auth/password/hint:
    get:
      description: Returns the password hint for the given email. Returns empty hint
        for unknown emails (enumeration-safe).
      parameters:
      - description: User email address
        in: query
        name: email
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_presenters_api.PasswordHintResponse'
      summary: Get password hint
      tags:
      - Auth
  /auth/prelogin:
    get:
      description: Returns salt and KDF parameters needed to derive the auth hash
        client-side
      parameters:
      - description: User email address
        in: query
        name: email
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_presenters_api.PreloginResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/internal_presenters_api.ErrorBody'
      summary: Get KDF parameters
      tags:
      - Auth
  /auth/recovery/reset:
    post:
      consumes:
      - application/json
      description: Reset password after client-side recovery key verification. Revokes
        all sessions and returns fresh tokens.
      parameters:
      - description: New auth credentials with re-encrypted keys
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_presenters_api.RecoveryResetRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_presenters_api.RecoveryResetResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_presenters_api.ErrorBody'
        "401":
          description: Unknown email
          schema:
            $ref: '#/definitions/internal_presenters_api.ErrorBody'
        "429":
          description: Rate limited
          schema:
            $ref: '#/definitions/internal_presenters_api.ErrorBody'
      summary: Reset password via recovery
      tags:
      - Auth
  /auth/recovery/verify:
    post:
      consumes:
      - application/json
      description: Returns encrypted key material so the client can attempt decryption
        with its recovery key.
      parameters:
      - description: Email to recover
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_presenters_api.RecoveryVerifyRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_presenters_api.RecoveryVerifyResponse'
        "401":
          description: Unknown email
          schema:
            $ref: '#/definitions/internal_presenters_api.ErrorBody'
        "429":
          description: Rate limited
          schema:
            $ref: '#/definitions/internal_presenters_api.ErrorBody'
      summary: Get recovery material
      tags:
      - Auth
  /auth/refresh:
    post:
      consumes:
      - application/json
      description: Exchange a valid refresh token for a new access/refresh token pair
      parameters:
      - description: Refresh token
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_presenters_api.RefreshRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_presenters_api.RefreshResponse'
        "401":
          description: Session expired
          schema:
            $ref: '#/definitions/internal_presenters_api.ErrorBody'
      summary: Refresh tokens
      tags:
      - Auth
  /auth/register:
    post:
      consumes:
      - application/json
      description: Create a new user account with client-side derived crypto material
      parameters:
      - description: Registration payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_presenters_api.RegisterRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/internal_presenters_api.RegisterResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_presenters_api.ErrorBody'
        "409":
          description: Email already taken
          schema:
            $ref: '#/definitions/internal_presenters_api.ErrorBody'
        "429":
          description: Rate limited
          schema:
            $ref: '#/definitions/internal_presenters_api.ErrorBody'
      summary: Register new user
      tags:
      - Auth
  /auth/step-up:
    post:
      consumes:
      - application/json
      description: Re-verify master password to get a step-up token for sensitive
        operations
      parameters:
      - description: Auth hash for re-authentication
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_presenters_api.StepUpRequest'
      produces:
      - application/json
      responses:
        "200":
