# Production-style self-hosted stack: Caddy (auto-TLS) + vaultctl + Postgres.
# See PRD §17.2 and deploy/caddy/Caddyfile.
#
# Usage:
#   cp .env.example .env
#   # fill in secrets — see .env.example header
#   docker compose up -d

name: vaultctl

services:
  caddy:
    image: caddy:2-alpine
    container_name: vaultctl-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    environment:
      VAULTCTL_BASE_URL: ${VAULTCTL_BASE_URL}
    networks:
      - vaultctl-net
    depends_on:
      vaultctl:
        condition: service_started

  vaultctl:
    build:
      context: .
      args:
        VERSION: ${VAULTCTL_VERSION:-latest}
    image: ghcr.io/vineethkrishnan/vaultctl:${VAULTCTL_VERSION:-latest}
    command: ["sh", "-c", "vaultctl migrate up && exec vaultctl server"]
    container_name: vaultctl-api
    restart: unless-stopped
    env_file: .env
    environment:
      # Loopback-only inside compose network, so `disable` is the exception
      # documented in H12. The explicit INSECURE_OK opt-in keeps the
      # production fail-closed default strict for every other deployment.
      VAULTCTL_DB_SSL_MODE: disable
      VAULTCTL_DB_SSL_INSECURE_OK: "true"
      VAULTCTL_DB_HOST: vaultctl-db
      VAULTCTL_ATTACHMENTS_DIR: /data/attachments
    volumes:
      - attachments-data:/data/attachments
      - backups-data:/data/backups
    networks:
      - vaultctl-net
    depends_on:
      vaultctl-db:
        condition: service_healthy

  vaultctl-db:
    image: postgres:16-alpine
    container_name: vaultctl-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${VAULTCTL_DB_NAME:-vaultctl}
      POSTGRES_USER: ${VAULTCTL_DB_USER:-vaultctl}
      POSTGRES_PASSWORD: ${VAULTCTL_DB_PASSWORD:?VAULTCTL_DB_PASSWORD must be set}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - vaultctl-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 3s
      retries: 5

  # --- Optional: Watchtower (in-app upgrade support) ---
  # Uncomment to enable one-click upgrades from the vaultctl admin UI.
  # Set VAULTCTL_UPGRADE_ENABLED=true and VAULTCTL_UPGRADE_HOOK_URL=http://watchtower:8080
  # in your .env file (VAULTCTL_UPGRADE_HOOK_TOKEN must match the Watchtower HTTP API token).
  #
  # watchtower:
  #   image: containrrr/watchtower
  #   container_name: vaultctl-watchtower
  #   restart: unless-stopped
  #   command: --http-api-update --http-api-periodic-polls vaultctl-api
  #   environment:
  #     WATCHTOWER_HTTP_API_TOKEN: ${VAULTCTL_UPGRADE_HOOK_TOKEN}
  #   volumes:
  #     - /var/run/docker.sock:/var/run/docker.sock
  #   networks:
  #     - vaultctl-net

volumes:
  caddy-data:
  caddy-config:
  postgres-data:
  attachments-data:
  backups-data:

networks:
  vaultctl-net:
    driver: bridge
