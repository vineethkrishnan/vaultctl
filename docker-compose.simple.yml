# Simple compose variant: NO Caddy. Use when fronting vaultctl with your own
# reverse proxy (nginx, Traefik, Cloudflare Tunnel, etc.).
#
# The API server is exposed on 127.0.0.1 only (port from VAULTCTL_HOST_PORT,
# default 8080) — never bind 0.0.0.0 without a TLS-terminating proxy in front.

name: vaultctl-simple

services:
  vaultctl:
    image: ghcr.io/vineethkrishnan/vaultctl:${VAULTCTL_VERSION:-latest}
    command: ["sh", "-c", "vaultctl migrate up && exec vaultctl server"]
    container_name: vaultctl-api
    restart: unless-stopped
    env_file: .env
    environment:
      VAULTCTL_DB_SSL_MODE: disable
      VAULTCTL_DB_SSL_INSECURE_OK: "true"
      VAULTCTL_DB_HOST: vaultctl-db
      VAULTCTL_ATTACHMENTS_DIR: /data/attachments
    ports:
      - "127.0.0.1:${VAULTCTL_HOST_PORT:-8080}:8080"
    volumes:
      - attachments-data:/data/attachments
      - backups-data:/data/backups
    networks:
      - vaultctl-net
    depends_on:
      vaultctl-db:
        condition: service_healthy

  vaultctl-db:
    image: postgres:16-alpine
    container_name: vaultctl-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${VAULTCTL_DB_NAME:-vaultctl}
      POSTGRES_USER: ${VAULTCTL_DB_USER:-vaultctl}
      POSTGRES_PASSWORD: ${VAULTCTL_DB_PASSWORD:?VAULTCTL_DB_PASSWORD must be set}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - vaultctl-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  postgres-data:
  attachments-data:
  backups-data:

networks:
  vaultctl-net:
    driver: bridge
